name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check shell syntax
        run: find scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Run ShellCheck when available
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck scripts/*.sh scripts/lib/*.sh
          else
            echo "ShellCheck is not installed on this runner; skipping."
          fi

      - name: Validate local Markdown links
        run: ./scripts/validate-links.sh

      - name: Verify dry-run commands
        run: |
          ./scripts/onboard.sh --dry-run --profile all
          ./scripts/macos-defaults.sh --dry-run
